version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      - DB_DSN=mysql:host=db;dbname=metaldur;charset=utf8mb4
      - DB_USERNAME=metaldur_erp
      - DB_PASSWORD=metaldur@5253
      - APP_DEBUG=1
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: metaldur
      MYSQL_USER: metaldur_erp
      MYSQL_PASSWORD: metaldur@5253
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
